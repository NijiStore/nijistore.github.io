<!DOCTYPE html>
<html>
<head>
  <title>Niji — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-title">Niji</div>
    <div class="login-sub">Access Gateway</div>

    <input id="user" class="login-input" placeholder="username">
    <input id="pass" class="login-input" type="password" placeholder="password">

    <button class="logout-btn" onclick="login()">Enter</button>
    <div id="errorMsg" class="login-error"></div>

  </div>
</div>

<script>
const API = 'https://niji-backend.onrender.com';

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

async function login() {
  const username = document.getElementById('user').value;
  const password = document.getElementById('pass').value;
  const errorEl = document.getElementById('errorMsg');

  errorEl.textContent = '';

  const btn = document.querySelector('.logout-btn');
  btn.classList.add('loading');

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      window.location.href = '/';
    } else {
      errorEl.textContent = 'Invalid credentials';
    }
  } catch (e) {
    errorEl.textContent = 'Network error';
  }

  btn.classList.remove('loading');
}
</script>

</body>
</html>
