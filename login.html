<!DOCTYPE html>
<html>
<head>
  <title>Niji — Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-title">Niji</div>
    <div class="login-sub">Access Gateway</div>

    <input id="user" class="login-input" placeholder="username">
    <input id="pass" class="login-input" type="password" placeholder="password">

    <button class="logout-btn" onclick="login()">Enter</button>

  </div>
</div>

<script>
const API = 'https://niji-backend.onrender.com';

async function login() {
  const username = document.getElementById('user').value;
  const password = document.getElementById('pass').value;

  const res = await fetch(API + '/auth/login', {
    method: 'POST',
    credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.success) {
    window.location.href = '/';
  } else {
    alert('Access denied');
  }
}
</script>

</body>
</html>
